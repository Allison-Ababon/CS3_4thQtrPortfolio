<!DOCTYPE html>
<head>
    <title> Allison Ababon Q4 graded exercise 1</title>
    
<link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="box">
    <h2>Add a Movie</h2>
    <form action="/submit" method="post" class="raitings">

        <label for="title">Title:</label>
        <br>
        <input type="text" id="title" name="title" required>
        <br>

        <label for="year">Year</label>
        <br>
        <input type="number" id="year" name="year" required>
        <br>
        <br>

        <label for="genre">Genre</label>
        <br>
        <select name="genres" id="genre" class="genre">
            <option value="romance">Romance</option>
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
        </select>
        <br>
        <br>

        <label>Rating:</label><br>
        <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label>
            <input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label>
            <input type="radio" id="star3" name="rating" value="3" /><label for="star3">★</label>
            <input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label>
            <input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label>
        </div>
        <br>

        <button type="submit">Add Movie</button>
    </form>
    <h2>Movie List:</h2>
    <div id="movieList" class="lists"></div>
</table>
    </div>

<script>

const form = document.querySelector(".raitings");
const movieList = document.getElementById("movieList");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;
    const rating = document.querySelector('input[name="rating"]:checked').value;

    const movie = {
        title: title,
        year: year,
        genre: genre,
        rating: rating
    };

    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    movies.push(movie);

    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();
});

function displayMovies(){

    movieList.innerHTML = "";

    const movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.forEach(movie => {

        let stars = "★".repeat(movie.rating);
        movieList.innerHTML += `
        <div style="border:1px solid #ccc; padding:15px; margin:10px; border-radius:8px;">
        ${movie.title} (${movie.year}) - ${movie.genre}, Rating: 
        <span style="color:gold">${stars}</span>
        </div>
        `;
    });
}
displayMovies();

</script>

</body>
